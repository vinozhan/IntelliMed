apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: intellimed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: intellimed/patient-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: intellimed-config
                  key: EUREKA_URL
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/patient_db"
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: intellimed-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: intellimed-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: intellimed-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: intellimed
spec:
  selector:
    app: patient-service
  ports:
    - port: 8081
      targetPort: 8081
---
