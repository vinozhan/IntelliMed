apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: intellimed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: intellimed/eureka-server:latest
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: intellimed
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
