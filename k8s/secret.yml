# IMPORTANT: Do NOT commit real secrets to git.
# Use `kubectl create secret` or a secrets manager (e.g., Sealed Secrets, External Secrets).
#
# Example:
#   kubectl create secret generic intellimed-secrets \
#     --namespace=intellimed \
#     --from-literal=JWT_SECRET='<your-jwt-secret>' \
#     --from-literal=DB_PASSWORD='<your-db-password>' \
#     --from-literal=STRIPE_SECRET_KEY='<your-stripe-key>' \
#     --from-literal=STRIPE_WEBHOOK_SECRET='<your-webhook-secret>' \
#     --from-literal=OPENAI_API_KEY='<your-openai-key>' \
#     --from-literal=EMAIL_USERNAME='<your-email>' \
#     --from-literal=EMAIL_PASSWORD='<your-email-password>' \
#     --from-literal=TWILIO_ACCOUNT_SID='<your-twilio-sid>' \
#     --from-literal=TWILIO_AUTH_TOKEN='<your-twilio-token>' \
#     --from-literal=TWILIO_PHONE_NUMBER='<your-twilio-phone>'
#
# For development/testing only — replace placeholder values before applying:
apiVersion: v1
kind: Secret
metadata:
  name: intellimed-secrets
  namespace: intellimed
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_use_a_strong_256_bit_secret"
  DB_PASSWORD: "CHANGE_ME_db_password"
  STRIPE_SECRET_KEY: "CHANGE_ME_stripe_secret"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME_stripe_webhook"
  OPENAI_API_KEY: "CHANGE_ME_openai_key"
  EMAIL_USERNAME: "CHANGE_ME_email"
  EMAIL_PASSWORD: "CHANGE_ME_email_password"
  TWILIO_ACCOUNT_SID: "CHANGE_ME_twilio_sid"
  TWILIO_AUTH_TOKEN: "CHANGE_ME_twilio_token"
  TWILIO_PHONE_NUMBER: "CHANGE_ME_twilio_phone"
