apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: intellimed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: intellimed/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: intellimed-config
                  key: EUREKA_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: intellimed-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: intellimed
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
