server:
  port: 8083

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: appointment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/appointment_db
    username: ${DB_USERNAME:intellimed}
    password: ${DB_PASSWORD:intellimed123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-make-it-long-enough-here}

spring.cloud.openfeign.circuitbreaker:
  enabled: true

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  timelimiter:
    instances:
      default:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info
