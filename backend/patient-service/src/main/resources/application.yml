server:
  port: 8081

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: patient-service
  datasource:
    url: jdbc:postgresql://localhost:5432/patient_db
    username: ${DB_USERNAME:intellimed}
    password: ${DB_PASSWORD:intellimed123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info
