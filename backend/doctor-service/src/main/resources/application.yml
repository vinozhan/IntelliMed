server:
  port: 8082

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: doctor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/doctor_db
    username: ${DB_USERNAME:intellimed}
    password: ${DB_PASSWORD:intellimed123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-make-it-long-enough-here}

management:
  endpoints:
    web:
      exposure:
        include: health,info
