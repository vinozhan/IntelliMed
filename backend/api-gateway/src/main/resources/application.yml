server:
  port: 8080

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service
              uri: lb://patient-service
              predicates:
                - Path=/api/auth/**, /api/patients/**, /api/admin/**
            - id: doctor-service
              uri: lb://doctor-service
              predicates:
                - Path=/api/doctors/**
            - id: appointment-service
              uri: lb://appointment-service
              predicates:
                - Path=/api/appointments/**
            - id: telemedicine-service
              uri: lb://telemedicine-service
              predicates:
                - Path=/api/telemedicine/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            - id: ai-symptom-checker
              uri: lb://ai-symptom-checker
              predicates:
                - Path=/api/ai/**
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
