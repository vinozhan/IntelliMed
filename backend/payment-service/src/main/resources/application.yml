server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: ${DB_USERNAME:intellimed}
    password: ${DB_PASSWORD:intellimed123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-make-it-long-enough-here}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_XXXX}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_XXXX}

management:
  endpoints:
    web:
      exposure:
        include: health,info
