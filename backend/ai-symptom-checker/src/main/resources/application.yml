server:
  port: 8087

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: ai-symptom-checker
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_db
    username: ${DB_USERNAME:intellimed}
    password: ${DB_PASSWORD:intellimed123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-make-it-long-enough-here}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-XXXX}
    model: gpt-4
    api-url: https://api.openai.com/v1/chat/completions

management:
  endpoints:
    web:
      exposure:
        include: health,info
