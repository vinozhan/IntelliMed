version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: intellimed-postgres
    environment:
      POSTGRES_USER: intellimed
      POSTGRES_PASSWORD: intellimed123
      POSTGRES_MULTIPLE_DATABASES: patient_db,doctor_db,appointment_db,telemedicine_db,payment_db,notification_db,ai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellimed"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./backend/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy

  patient-service:
    build: ./backend/patient-service
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  doctor-service:
    build: ./backend/doctor-service
    container_name: doctor-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doctor_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  appointment-service:
    build: ./backend/appointment-service
    container_name: appointment-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointment_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  telemedicine-service:
    build: ./backend/telemedicine-service
    container_name: telemedicine-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telemedicine_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ai-symptom-checker:
    build: ./backend/ai-symptom-checker
    container_name: ai-symptom-checker
    ports:
      - "8087:8087"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_USERNAME: intellimed
      DB_PASSWORD: intellimed123
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_db
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: intellimed-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
